<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Materials — TOEFL Mastery</title>
  <meta name="description" content="Access and preview your TOEFL study materials and PDFs"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/student.css"/>
  <style>
    .table-wrapper { background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-lg);overflow-x:auto;margin-top:1rem; }
    .table { width:100%;border-collapse:collapse;text-align:left; }
    .table th,.table td { padding:1rem;border-bottom:1px solid var(--border); }
    .table th { font-weight:600;color:var(--text-primary);background:rgba(255,255,255,0.02); }
    .table td { color:var(--text-secondary);font-size:0.9rem; }
    .table tr:last-child td { border-bottom:none; }
    .badge { display:inline-block;padding:0.25rem 0.5rem;border-radius:4px;font-size:0.75rem;font-weight:600; }
    .badge-success { background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3); }
    .badge-neutral  { background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border); }
    .badge-accent   { background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3); }

    /* PDF Preview Drawer */
    .pdf-drawer {
      position:fixed; inset:0; z-index:2000;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .pdf-drawer.open { opacity:1; pointer-events:all; }
    .pdf-drawer-inner {
      background:var(--bg-secondary);border:1px solid var(--border);
      border-radius:var(--radius-lg);width:min(95vw,900px);height:90vh;
      display:flex;flex-direction:column;overflow:hidden;
      transform:scale(0.95);transition:transform 0.3s;
    }
    .pdf-drawer.open .pdf-drawer-inner { transform:scale(1); }
    .pdf-drawer-header {
      padding:1rem 1.5rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    }
    .pdf-drawer-title { font-weight:600;color:var(--text-primary); }
    .pdf-close { background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0.25rem; }
    .pdf-close:hover { color:var(--text-primary); }
    .pdf-frame { flex:1;width:100%;border:none; }
    .text-preview {
      flex:1;overflow-y:auto;padding:2rem;
      white-space:pre-wrap;font-family:'Outfit',sans-serif;
      font-size:0.95rem;line-height:1.8;color:var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <button class="sidebar-toggle" id="sidebarToggle"><span></span></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand"><span class="gradient-text">TOEFL Mastery</span></div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="dashboard.html#coursesSection" class="sidebar-nav-item"><span class="nav-icon">📚</span> My Courses</a>
        <a href="materials.html" class="sidebar-nav-item active"><span class="nav-icon">📂</span> Study Materials</a>
        <a href="messages.html" class="sidebar-nav-item"><span class="nav-icon">💬</span> Messages</a>
        <a href="profile.html" class="sidebar-nav-item"><span class="nav-icon">👤</span> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-block" onclick="auth.logout()">🚪 Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header animate-in">
        <h2>📂 Study Materials &amp; PDFs</h2>
        <p>Preview and access study resources for your courses</p>
      </div>

      <!-- Access Code Quick Redeem -->
      <div class="card animate-in" style="margin-bottom:2rem;margin-top:1.5rem;">
        <h3 style="margin-bottom:var(--sp-xs);font-size:1.15rem;">🔑 Redeem Access Code</h3>
        <p class="body-sm text-muted" style="margin-bottom:var(--sp-md);">Have a code? Enter it to unlock courses or premium PDFs.</p>
        <div class="flex gap-md" style="flex-wrap:wrap;">
          <input type="text" class="form-input" id="accessCodeInput" placeholder="ENTER-CODE-HERE" maxlength="30" style="max-width:350px;" />
          <button class="btn btn-primary" onclick="redeemCode()" id="redeemBtn">Redeem Code</button>
        </div>
        <div id="codeAlert" class="form-alert mt-sm" style="display:none;padding:0.5rem 1rem;border-radius:6px;font-size:0.85rem;"></div>
      </div>

      <!-- Materials List -->
      <div id="materialsContainer" class="animate-in">
        <div class="card skeleton skeleton-card" style="height:120px;margin-bottom:1.5rem;"></div>
        <div class="card skeleton skeleton-card" style="height:120px;margin-bottom:1.5rem;"></div>
      </div>
      <div id="materialsEmpty" class="empty-state hidden">
        <div class="empty-icon">📂</div>
        <p>No study materials are currently available.</p>
      </div>
    </main>
  </div>

  <!-- PDF / Text Preview Drawer -->
  <div class="pdf-drawer" id="pdfDrawer">
    <div class="pdf-drawer-inner">
      <div class="pdf-drawer-header">
        <span class="pdf-drawer-title" id="drawerTitle">Preview</span>
        <button class="pdf-close" onclick="closePreview()">✕</button>
      </div>
      <iframe class="pdf-frame" id="pdfFrame" src="" style="display:none;"></iframe>
      <div class="text-preview" id="textPreview" style="display:none;"></div>
    </div>
  </div>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/+201234567890" target="_blank" class="fab-whatsapp" data-tooltip="Chat on WhatsApp">💬</a>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (!auth.requireRole('student')) throw new Error('redirect');

    // Theme
    (function() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeToggle').textContent = saved === 'dark' ? '🌙' : '☀️';
    })();
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
    });

    // Sidebar
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    });
    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    });

    // ---- PDF Preview ----
    function openPreview(url, title, type) {
      document.getElementById('drawerTitle').textContent = title;
      const frame = document.getElementById('pdfFrame');
      const textEl = document.getElementById('textPreview');

      if (type === 'TEXT') {
        frame.style.display = 'none';
        textEl.style.display = '';
        textEl.textContent = 'Loading text...';
        fetch(url).then(r=>r.text()).then(t=>{ textEl.textContent = t; }).catch(()=>{ textEl.textContent = 'Failed to load text.'; });
      } else {
        textEl.style.display = 'none';
        frame.style.display = '';
        frame.src = url;
      }
      document.getElementById('pdfDrawer').classList.add('open');
    }

    function closePreview() {
      document.getElementById('pdfDrawer').classList.remove('open');
      document.getElementById('pdfFrame').src = '';
      document.getElementById('textPreview').textContent = '';
    }
    document.getElementById('pdfDrawer').addEventListener('click', (e) => {
      if (e.target === document.getElementById('pdfDrawer')) closePreview();
    });

    async function loadMaterials() {
      const container = document.getElementById('materialsContainer');
      const emptyState = document.getElementById('materialsEmpty');
      container.innerHTML = '<div class="card skeleton skeleton-card" style="height:120px;margin-bottom:1.5rem;"></div>';
      emptyState.classList.add('hidden');
      try {
        const data = await api.get('/courses');
        const courses = data.courses || data.data || data || [];
        container.innerHTML = '';
        let hasAnyMaterials = false;

        for (const c of courses) {
          let matData;
          try { matData = await api.get(`/courses/${c.id}/materials`); } catch { continue; }
          const materials = matData.materials || [];
          if (!materials.length) continue;
          hasAnyMaterials = true;

          const courseBlock = document.createElement('div');
          courseBlock.className = 'card animate-in';
          courseBlock.style.marginBottom = '1.5rem';
          courseBlock.innerHTML = `
            <h3 style="margin-bottom:var(--sp-xs);font-size:1.25rem;">📚 ${c.title}</h3>
            <p class="body-xs text-muted" style="margin-bottom:1rem;">${c.description || ''}</p>
            <div class="table-wrapper">
              <table class="table">
                <thead><tr><th>Material</th><th>Type</th><th>Access</th><th>Actions</th></tr></thead>
                <tbody>
                  ${materials.map(m => {
                    const canAccess = m.is_free || m.has_access;
                    const hostUrl = CONFIG.API_URL.replace('/api','');
                    const fileLink = canAccess ? (m.file_url.startsWith('http') ? m.file_url : `${hostUrl}${m.file_url}`) : '#';
                    return `<tr>
                      <td style="font-weight:500;">📄 ${m.title}</td>
                      <td><span class="badge badge-neutral">${m.material_type}</span></td>
                      <td><span class="badge ${m.is_free?'badge-success':(m.has_access?'badge-accent':'badge-neutral')}">${m.is_free?'🆓 Free':(m.has_access?'🔑 Unlocked':'🔒 Premium')}</span></td>
                      <td><div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                        ${canAccess
                          ? `<button class="btn btn-sm btn-primary" onclick="openPreview('${fileLink}','${m.title.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${m.material_type}')">👁 Preview</button>
                             <a href="${fileLink}" target="_blank" class="btn btn-sm btn-ghost" download>⬇ Download</a>`
                          : `<button onclick="focusAccessCode()" class="btn btn-sm btn-secondary" style="opacity:0.6">Unlock</button>`}
                      </div></td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>`;
          container.appendChild(courseBlock);
        }

        if (!hasAnyMaterials) { emptyState.classList.remove('hidden'); container.innerHTML = ''; }
      } catch(e) {
        container.innerHTML = `<div class="alert alert-error">Failed to load study materials.</div>`;
      }
    }

    function focusAccessCode() {
      const input = document.getElementById('accessCodeInput');
      input.scrollIntoView({ behavior: 'smooth' }); input.focus();
    }

    async function redeemCode() {
      const input = document.getElementById('accessCodeInput');
      const btn = document.getElementById('redeemBtn');
      const alertEl = document.getElementById('codeAlert');
      const code = input.value.trim();
      if (!code) return;
      btn.disabled = true; btn.textContent = 'Verifying...';
      alertEl.style.display = 'none';
      try {
        const res = await api.post('/access-codes/redeem', { code });
        alertEl.textContent = res.message || 'Access granted!';
        alertEl.className = 'form-alert show success';
        alertEl.style.display = 'block';
        input.value = '';
        loadMaterials();
      } catch(err) {
        alertEl.textContent = err.message || 'Failed to redeem code.';
        alertEl.className = 'form-alert show error';
        alertEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Redeem Code';
      }
    }

    loadMaterials();
  </script>
</body>
</html>
